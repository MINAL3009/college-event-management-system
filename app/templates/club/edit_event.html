{% extends "base.html" %}

{% block title %}Edit Event - {{ event.title }}{% endblock %}

{% block extra_css %}
<style>
    .page-container {
        padding: var(--spacing-2xl) 0;
        background: var(--light);
        min-height: calc(100vh - 70px);
    }
    
    .form-container {
        max-width: 900px;
        margin: 0 auto;
        background: var(--white);
        padding: var(--spacing-2xl);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-lg);
    }
</style>
{% endblock %}

{% block content %}
<div class="page-container">
    <div class="container">
        <div class="form-container">
            <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: var(--spacing-xl);">
                Edit Event: {{ event.title }}
            </h1>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title">Event Title *</label>
                    <input type="text" id="title" name="title" value="{{ event.title }}" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" rows="4" required>{{ event.description }}</textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="event_type">Event Type *</label>
                        <select id="event_type" name="event_type" required>
                            {% for type in event_types %}
                            <option value="{{ type }}" {% if event.event_type == type %}selected{% endif %}>{{ type }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="venue">Venue *</label>
                        <input type="text" id="venue" name="venue" value="{{ event.venue }}" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="event_date">Event Date & Time *</label>
                        <input type="datetime-local" id="event_date" name="event_date" 
                               value="{{ event.event_date.strftime('%Y-%m-%dT%H:%M') }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="registration_deadline">Registration Deadline *</label>
                        <input type="datetime-local" id="registration_deadline" name="registration_deadline" 
                               value="{{ event.registration_deadline.strftime('%Y-%m-%dT%H:%M') }}" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="max_participants">Maximum Participants *</label>
                    <input type="number" id="max_participants" name="max_participants" 
                           value="{{ event.max_participants }}" min="{{ event.current_participants }}" required>
                    <small style="color: var(--gray-500);">Current registrations: {{ event.current_participants }}</small>
                </div>
                
                <div class="form-check">
                    <input type="checkbox" id="is_team_event" name="is_team_event" 
                           {% if event.is_team_event %}checked{% endif %} onchange="toggleTeamFields()">
                    <label for="is_team_event">This is a team event</label>
                </div>
                
                <div id="team-fields" style="{% if not event.is_team_event %}display: none;{% endif %} background: var(--gray-50); padding: var(--spacing-lg); border-radius: var(--radius-md); margin-top: var(--spacing-md);">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="team_size_min">Minimum Team Size</label>
                            <input type="number" id="team_size_min" name="team_size_min" 
                                   value="{{ event.team_size_min or 2 }}" min="1">
                        </div>
                        
                        <div class="form-group">
                            <label for="team_size_max">Maximum Team Size</label>
                            <input type="number" id="team_size_max" name="team_size_max" 
                                   value="{{ event.team_size_max or 5 }}" min="1">
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="rules">Rules & Guidelines</label>
                    <textarea id="rules" name="rules" rows="4">{{ event.rules or '' }}</textarea>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: var(--spacing-lg);">
                    💾 Save Changes
                </button>
                
                <a href="{{ url_for('clubs.my_events') }}" class="btn btn-outline" 
                   style="width: 100%; margin-top: var(--spacing-md);">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>

<script>
function toggleTeamFields() {
    const checkbox = document.getElementById('is_team_event');
    const fields = document.getElementById('team-fields');
    fields.style.display = checkbox.checked ? 'block' : 'none';
}
</script>
{% endblock %}
