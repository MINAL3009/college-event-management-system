{% extends "base.html" %}

{% block title %}Student Registration - CampusConnect{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
<style>
    .auth-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-2xl) 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .auth-card {
        background: var(--white);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-xl);
        max-width: 600px;
        width: 90%;
        overflow: hidden;
    }
    
    .auth-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        color: var(--white);
        padding: var(--spacing-2xl);
        text-align: center;
    }
    
    .auth-icon {
        font-size: 4rem;
        margin-bottom: var(--spacing-md);
    }
    
    .auth-title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: var(--spacing-sm);
    }
    
    .auth-subtitle {
        opacity: 0.9;
        font-size: 1rem;
    }
    
    .auth-body {
        padding: var(--spacing-2xl);
    }
    
    .auth-footer {
        text-align: center;
        padding-top: var(--spacing-lg);
        color: var(--gray-600);
    }
    
    .auth-footer a {
        color: var(--primary);
        font-weight: 600;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card animate-scale-in">
        <div class="auth-header">
            <div class="auth-icon">📝</div>
            <h1 class="auth-title">Student Registration</h1>
            <p class="auth-subtitle">Join CampusConnect today</p>
        </div>
        
        <div class="auth-body">
            <form method="POST">
                <!-- Name -->
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="your.email@college.edu" required>
                </div>
                
                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="Minimum 8 characters" required>
                    <small style="color: var(--gray-500);">Must be at least 8 characters long</small>
                </div>
                
                <!-- Branch and Year -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="branch">Branch *</label>
                        <select id="branch" name="branch" required>
                            <option value="">Select Branch</option>
                            <option value="Computer Engineering">Computer Engineering</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Civil">Civil</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="year">Year *</label>
                        <select id="year" name="year" required>
                            <option value="">Select Year</option>
                            <option value="FY">FY (First Year)</option>
                            <option value="SY">SY (Second Year)</option>
                            <option value="TY">TY (Third Year)</option>
                            <option value="Final Year">Final Year</option>
                        </select>
                    </div>
                </div>
                
                <!-- Division -->
                <div class="form-group">
                    <label for="division">Division *</label>
                    <input type="text" id="division" name="division" placeholder="e.g., A, B, C" required>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--spacing-lg);">
                    Create Account
                </button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('auth.login', role='student') }}">Login here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
